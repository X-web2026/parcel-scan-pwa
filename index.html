<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#175c62" />
    <title>快递扫描记录</title>
    <link rel="manifest" href="./manifest.webmanifest?v=8" />
    <link rel="stylesheet" href="./styles.css?v=8" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" data-i18n="eyebrow">PDA + Web</p>
          <h1 data-i18n="appTitle">快递扫描记录</h1>
        </div>
        <div class="topbar-actions">
          <select class="language-select" id="languageSelect" aria-label="Language">
            <option value="zh">中文</option>
            <option value="en">English</option>
            <option value="th">ไทย</option>
          </select>
          <div class="status-pill" id="syncStatus">启动中</div>
          <button class="settings-button" data-view="settingsView" type="button" title="设置" aria-label="设置">⚙</button>
        </div>
      </header>

      <nav class="tabs" aria-label="主导航">
        <button class="tab is-active" data-view="scanView" data-i18n="scanTab" type="button">扫描</button>
        <button class="tab" data-view="recordsView" data-i18n="recordsTab" type="button">记录</button>
      </nav>

      <main>
        <section class="view is-active" id="scanView">
          <div class="scan-layout">
            <section class="panel scan-panel">
              <div class="panel-heading">
                <div>
                  <p class="eyebrow" data-i18n="scanEyebrow">连续扫描</p>
                  <h2 data-i18n="scanTitle">PDA 扫码录入</h2>
                </div>
                <button class="icon-button" id="installButton" type="button" title="安装到桌面" aria-label="安装到桌面">+</button>
              </div>

              <form id="scanForm" autocomplete="off">
                <div class="scan-card">
                  <label class="field-label" for="trackingInput" data-i18n="trackingLabel">运单号</label>
                  <input id="trackingInput" class="scan-input" name="trackingNumber" inputmode="text" placeholder="请扫描或输入运单号" autofocus />
                </div>

                <label class="operator-field">
                  <span data-i18n="operatorLabel">扫描人员</span>
                  <select id="operatorInput" name="operator" required>
                    <option value="" data-i18n="operatorPlaceholder">请选择扫描人员</option>
                    <option value="Agate">Agate</option>
                    <option value="Far">Far</option>
                    <option value="Tam">Tam</option>
                    <option value="Jane">Jane</option>
                  </select>
                </label>

                <div class="actions">
                  <button class="primary-button" data-i18n="saveButton" type="submit">保存记录</button>
                  <button class="secondary-button" id="clearScanButton" data-i18n="clearButton" type="button">清空</button>
                </div>
              </form>
              <p class="helper" data-i18n="scanHelper">PDA 扫码头输入后会自动保存；如果设备发送回车，也会立即保存。</p>
            </section>

            <aside class="panel stats-panel">
              <div class="stat">
                <span data-i18n="todayCount">今日扫描</span>
                <strong id="todayCount">0</strong>
              </div>
              <div class="stat">
                <span data-i18n="totalCount">总记录</span>
                <strong id="totalCount">0</strong>
              </div>
              <div class="stat duplicate">
                <span data-i18n="duplicateCount">重复提醒</span>
                <strong id="duplicateCount">0</strong>
              </div>
              <div class="last-scan" id="lastScan">暂无扫描记录</div>
              <div class="retention-note" id="retentionNote">仅保留最近 365 天数据</div>
            </aside>
          </div>
        </section>

        <section class="view" id="recordsView">
          <section class="panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow" data-i18n="recordsEyebrow">Web 后台</p>
                <h2 data-i18n="recordsTitle">记录查询</h2>
              </div>
              <div class="heading-actions">
                <button class="secondary-button" id="refreshButton" data-i18n="refreshButton" type="button">刷新记录</button>
                <button class="secondary-button" id="exportButton" data-i18n="exportButton" type="button">导出 CSV</button>
              </div>
            </div>

            <div class="filters">
              <input id="searchInput" placeholder="搜索运单号、扫描人员" />
              <input id="dateInput" type="date" />
              <button class="secondary-button" id="resetFiltersButton" data-i18n="resetButton" type="button">重置</button>
            </div>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th data-i18n="trackingHeader">运单号</th>
                    <th data-i18n="timeHeader">时间</th>
                    <th data-i18n="operatorHeader">扫描人员</th>
                    <th data-i18n="statusHeader">状态</th>
                  </tr>
                </thead>
                <tbody id="recordsBody"></tbody>
              </table>
            </div>
            <p class="empty" id="emptyState" data-i18n="emptyState">暂无记录</p>
          </section>
        </section>

        <section class="view" id="settingsView">
          <section class="panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Supabase</p>
                <h2 data-i18n="settingsTitle">连接设置</h2>
              </div>
              <button class="secondary-button" id="testConnectionButton" data-i18n="testConnectionButton" type="button">测试连接</button>
            </div>

            <div class="settings-grid">
              <label>
                <span>Supabase URL</span>
                <input id="supabaseUrlInput" placeholder="https://xxxx.supabase.co" />
              </label>
              <label>
                <span>Anon Key</span>
                <input id="supabaseKeyInput" placeholder="eyJ..." />
              </label>
            </div>

            <div class="actions">
              <button class="primary-button" id="saveSettingsButton" data-i18n="saveSettingsButton" type="button">保存设置</button>
              <button class="secondary-button" id="useLocalButton" data-i18n="localModeButton" type="button">使用本地模式</button>
            </div>
            <p class="helper" data-i18n="settingsHelper">日常使用不需要进入设置；只有更换 Supabase 项目或临时切回本地模式时才需要修改这里。</p>
          </section>
        </section>
      </main>
      <footer class="version" id="versionText">版本：Cloud v3</footer>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js?v=8" type="module"></script>
  </body>
</html>
